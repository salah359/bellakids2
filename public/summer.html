<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تشكيلة الصيف | بيلا كيدز</title>
    <meta name="theme-color" content="#FF9F1C">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        :root {
            --season-primary: #FF9F1C;   /* Bright Orange */
            --season-secondary: #FFBF69; /* Warm Yellow */
            --season-accent: #2EC4B6;    /* Cyan/Teal */
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(255, 159, 28, 0.1);
        }

        body { font-family: 'Cairo', sans-serif !important; background: linear-gradient(135deg, #fffdf5 0%, #ffeaa7 100%); color: #2d3436; overflow-x: hidden; scroll-behavior: smooth; }
        #season-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); }
        .glass-nav { background: rgba(255, 255, 255, 0.85) !important; backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.8); transition: all 0.4s ease; }
        .glass-nav.scrolled { box-shadow: 0 10px 30px rgba(0,0,0,0.08); background: rgba(255, 255, 255, 0.98) !important; }

        .hero-season { position: relative; padding: 15vh 0 10vh; text-align: center; overflow: hidden; border-bottom-left-radius: 60px; border-bottom-right-radius: 60px; background: rgba(255,255,255,0.5); backdrop-filter: blur(8px); border-bottom: 3px solid rgba(255,255,255,0.8); box-shadow: 0 20px 50px rgba(255, 159, 28, 0.05); margin-bottom: 60px; }
        .hero-title { font-size: clamp(3rem, 6vw, 5.5rem); font-weight: 900; line-height: 1.2; letter-spacing: -1px; background: linear-gradient(45deg, var(--season-primary), var(--season-accent), #FF5A5F); background-size: 200% auto; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shineText 6s linear infinite; margin-bottom: 20px; }
        @keyframes shineText { to { background-position: 200% center; } }
        .hero-subtitle { font-size: 1.25rem; color: #4a4a4a; max-width: 700px; margin: 0 auto 40px; font-weight: 600; }
        .floating-shape { position: absolute; animation: floatUpDown 6s ease-in-out infinite; z-index: 0; opacity: 0.9; }
        @keyframes floatUpDown { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(10deg); } }

        .season-filter-bar { border-radius: 50px; padding: 15px; position: relative; z-index: 10; margin-top: -50px; margin-bottom: 60px; background: rgba(255,255,255,0.9); border: 2px solid white; }
        .filter-input, .filter-select { background: rgba(255,255,255,0.95); border: 2px solid transparent !important; border-radius: 30px !important; padding: 15px 25px; font-weight: 700; color: #2d3436; transition: all 0.3s ease; }
        .filter-input:focus, .filter-select:focus { border-color: var(--season-primary) !important; box-shadow: 0 0 15px rgba(255, 159, 28, 0.3) !important; outline: none; transform: translateY(-2px); }
        .search-icon { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); color: var(--season-primary); font-size: 1.3rem; z-index: 5; }

        .season-card-wrapper { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); height: 100%; }
        .season-card-wrapper:hover { transform: translateY(-15px) scale(1.02); z-index: 2; }
        .season-product-card { background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(15px); border-radius: 35px !important; border: 3px solid rgba(255,255,255,1) !important; box-shadow: 0 15px 35px rgba(0,0,0,0.06) !important; overflow: hidden; position: relative; height: 100%; display: flex; flex-direction: column; padding: 10px; }
        .season-product-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 35px; padding: 4px; background: linear-gradient(135deg, var(--season-primary), var(--season-secondary), var(--season-accent)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 10; }
        .season-card-wrapper:hover .season-product-card::before { opacity: 1; }
        .season-badge { position: absolute; top: 10px; right: 10px; background: linear-gradient(45deg, var(--season-primary), #FF5A5F); color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 800; z-index: 10; box-shadow: 0 4px 10px rgba(255, 159, 28, 0.3); display: flex; align-items: center; animation: pulseBadge 2.5s infinite; pointer-events: none; }
        @keyframes pulseBadge { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .season-card-img-container { position: relative; overflow: hidden; border-radius: 25px; aspect-ratio: 3/4; background: #fdfdfd; }
        .season-card-img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .season-card-wrapper:hover .season-card-img-container img { transform: scale(1.1) rotate(1deg); }
        .season-add-btn { background: linear-gradient(45deg, var(--season-primary), var(--season-secondary)); border: none; border-radius: 50px; color: white; font-weight: 900; font-size: 1.1rem; padding: 12px 25px; width: 100%; transition: all 0.4s; box-shadow: 0 8px 20px rgba(255, 159, 28, 0.4); display: flex; justify-content: center; align-items: center; gap: 10px; }
        .season-add-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255, 159, 28, 0.6); color: white; background: linear-gradient(45deg, var(--season-secondary), var(--season-primary)); }

        .cart-float { position: fixed; bottom: 110px; right: 30px; width: 70px; height: 70px; background: linear-gradient(135deg, var(--season-primary), var(--season-accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; box-shadow: 0 15px 35px rgba(255, 159, 28, 0.4); border: 3px solid white; z-index: 1000; cursor: pointer; transition: all 0.4s; animation: floatBubble 4s infinite ease-in-out; }
        .cart-float .badge { position: absolute; top: -5px; right: -5px; background: #FF5A5F !important; color: white !important; border: 2px solid white; border-radius: 50%; width: 28px; height: 28px; font-size: 0.9rem; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 35px rgba(37, 211, 102, 0.4); border: 3px solid white; z-index: 1000; transition: all 0.4s; animation: floatBubble 4s infinite ease-in-out reverse; }
        .whatsapp-float img { width: 38px; height: auto; }
        .cart-float:hover, .whatsapp-float:hover { transform: scale(1.15) translateY(-10px); }
        @keyframes floatBubble { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        @media (max-width: 768px) { .hero-title { font-size: 2.6rem; } .hero-season { padding: 12vh 0 6vh; border-radius: 0 0 40px 40px; } .season-filter-bar { margin-top: -30px; padding: 10px; } .whatsapp-float, .cart-float { width: 60px; height: 60px; right: 20px; } .cart-float { bottom: 95px; font-size: 1.5rem; } .whatsapp-float { bottom: 20px; } .whatsapp-float img { width: 32px; } }
    </style>
</head>
<body>
    <canvas id="season-canvas"></canvas>

    <nav class="navbar navbar-expand-lg sticky-top glass-nav" id="main-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/home"><img src="assets/images/logo.png" alt="Bella Kids Logo" class="nav-logo"></a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/home">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="/boys">الأولاد</a></li>
                    <li class="nav-item"><a class="nav-link" href="/girls">البنات</a></li>
                    <li class="nav-item"><a class="nav-link" href="/newborn">المواليد</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-primary" href="/offers">العروض 🔥</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="offcanvas" data-bs-target="#cartSidebar" style="background: var(--season-primary); border: none;">
                        <span>السلة</span> <span class="badge cart-count ms-1">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-season">
        <svg class="floating-shape" style="top: 15%; right: 10%; fill: var(--season-primary);" width="60" height="60" viewBox="0 0 24 24"><path d="M12 2a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1zm0 17a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0v-2a1 1 0 0 1 1-1zm10-8a1 1 0 0 1-1 1h-2a1 1 0 1 1 0-2h2a1 1 0 0 1 1 1zM5 12a1 1 0 0 1-1 1H2a1 1 0 1 1 0-2h2a1 1 0 0 1 1 1zm14.07-7.07a1 1 0 0 1 0 1.41l-1.41 1.42a1 1 0 0 1-1.42-1.42l1.42-1.41a1 1 0 0 1 1.41 0zM6.34 17.66a1 1 0 0 1 0 1.41l-1.41 1.42a1 1 0 0 1-1.42-1.42l1.42-1.41a1 1 0 0 1 1.41 0zm12.73 6.34a1 1 0 0 1-1.41 0l-1.42-1.41a1 1 0 0 1 1.42-1.42l1.41 1.42a1 1 0 0 1 0 1.41zM7.76 6.34a1 1 0 0 1-1.42 0L4.93 4.93a1 1 0 1 1 1.42-1.42l1.41 1.42a1 1 0 0 1 0 1.41zM12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/></svg>

        <div class="container position-relative z-1" data-aos="zoom-in">
            <span class="badge rounded-pill mb-3 px-4 py-2 shadow-sm" style="background: rgba(255,255,255,0.9); color: var(--season-primary); font-size: 1.1rem; border: 1px solid var(--season-primary);">موسم الصيف ☀️</span>
            <h1 class="hero-title">تشكيلة الصيف المشرقة</h1>
            <p class="hero-subtitle">ملابس خفيفة وباردة تمنح أطفالكم الحرية والانطلاق في أيام الصيف.</p>
        </div>
    </header>

    <main id="shop-section" class="container pb-5">
        <div class="row justify-content-center" data-aos="fade-up">
            <div class="col-lg-11">
                <div class="glass-panel season-filter-bar shadow-sm">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-12 col-lg-3 position-relative">
                            <input type="text" id="productSearch" class="form-control filter-input w-100" placeholder="ابحث عن..." onkeyup="filterSearch()">
                            <span class="search-icon">🔍</span>
                        </div>
                        <div class="col-4 col-lg-3">
                            <select class="form-select filter-select" id="categoryFilter" onchange="filterSearch()"><option value="all">كل الأقسام</option><option value="boys">أولاد</option><option value="girls">بنات</option><option value="newborn">مواليد</option></select>
                        </div>
                        <div class="col-4 col-lg-3"><select class="form-select filter-select" id="ageFilter" onchange="filterSearch()"><option value="all">الأعمار</option></select></div>
                        <div class="col-4 col-lg-3"><select class="form-select filter-select" id="typeFilter" onchange="filterSearch()"><option value="all">الأنواع</option></select></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row g-4 justify-content-center" id="product-grid" style="min-height: 50vh;"></div>
        <div id="empty-state" class="text-center py-5 d-none"><h2 class="fw-bold text-dark">لا توجد قطع مطابقة</h2></div>
    </main>

    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content rounded-5 border-0 overflow-hidden shadow-lg glass-panel">
                <div class="row g-0">
                    <div class="col-md-6 bg-light position-relative" id="modalImageContainer"></div>
                    <div class="col-md-6 bg-white">
                        <div class="modal-header border-0 pb-0 pt-4 pe-4"><button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button></div>
                        <div class="modal-body p-4 pt-2">
                            <h3 id="popupName" class="fw-bold mb-2" style="color: var(--season-primary);"></h3>
                            <h4 id="popupPrice" class="fw-bold mb-4" style="color: #2d3436;"></h4>
                            <div class="mb-4 p-3 rounded-4 bg-light"><label class="small fw-bold mb-3">اختر المقاس</label><div id="sizeSelector" class="d-flex flex-wrap gap-2"></div></div>
                            <div class="mb-4"><label class="small fw-bold mb-2">الألوان</label><div id="thumbnailsSelector" class="d-flex flex-wrap gap-2"></div></div>
                            <div class="mb-4 d-flex align-items-center gap-3">
                                <label class="fw-bold m-0">الكمية:</label>
                                <div class="d-flex align-items-center gap-2 bg-light rounded-pill p-1 border">
                                    <button class="btn btn-sm rounded-circle fw-bold" onclick="adjustModalQty(-1)" style="width:30px; height:30px; background:#e0e0e0;">-</button>
                                    <input type="text" id="modalQty" class="form-control border-0 bg-transparent text-center fw-bold p-0" value="1" style="width: 40px;" readonly>
                                    <button class="btn btn-sm rounded-circle fw-bold text-white" onclick="adjustModalQty(1)" style="width:30px; height:30px; background:var(--season-primary);">+</button>
                                </div>
                            </div>
                            <button id="modalAddToCart" class="season-add-btn py-3 fs-5 mt-3">أضف إلى السلة 🛍️</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end border-0 shadow-lg glass-panel" tabindex="-1" id="cartSidebar">
        <div class="offcanvas-header border-bottom py-4"><h4 class="fw-bold m-0" style="color: var(--season-primary);">السلة</h4><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div>
        <div class="offcanvas-body" id="cartItems"></div>
        <div class="p-4 border-top bg-white rounded-top-5 shadow-lg">
            <div class="d-flex justify-content-between mb-4 pt-3 border-top"><span class="fw-bold h4 m-0">المجموع:</span><span id="cartTotal" class="fw-bold h3 m-0" style="color: var(--season-primary);">₪0.00</span></div>
            <button class="btn w-100 rounded-pill py-3 fw-bold shadow-lg fs-5 text-white" onclick="sendToWhatsApp()" style="background: #25d366;">إرسال عبر واتساب 💬</button>
        </div>
    </div>

    <div class="cart-float" data-bs-toggle="offcanvas" data-bs-target="#cartSidebar">🛍️ <span class="badge cart-count">0</span></div>
    <a href="https://wa.me/972598439251" class="whatsapp-float" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA"></a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>

    <script>
    // 1. Initialize Animations & Navbar
        AOS.init({ duration: 1000, once: true, offset: 50 });
        window.addEventListener('scroll', () => { 
            const nav = document.getElementById('main-nav');
            if (nav) nav.classList.toggle('scrolled', window.scrollY > 50); 
        });

        // 2. Winter Snow Particles
        const canvas = document.getElementById('season-canvas');
        const ctx = canvas ? canvas.getContext('2d') : null;
        let width, height, particles;
        
        function initParticles() {
            if (!canvas || !ctx) return;
            width = canvas.width = window.innerWidth; 
            height = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<80; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    r: Math.random() * 3 + 1, dx: (Math.random() - 0.5) * 1, dy: Math.random() * 1.5 + 0.5,
                    color: '#ffffff',
                    alpha: Math.random() * 0.8 + 0.2
                });
            }
        }
        
        function animateParticles() {
            if (!ctx) return;
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255, ${p.alpha})`; 
                ctx.shadowBlur = 5; ctx.shadowColor = 'white';
                ctx.fill();
                p.x += p.dx + Math.sin(p.y * 0.01); p.y += p.dy;
                if(p.y > height) { p.y = -10; p.x = Math.random() * width; }
            });
            requestAnimationFrame(animateParticles);
        }
        window.addEventListener('resize', initParticles); 
        initParticles(); 
        animateParticles();

        // 3. Grid Filtering Logic
        window.filterGrid = function() {
            const grid = document.getElementById('product-grid');
            const emptyState = document.getElementById('empty-state');
            if (!grid) return;
            
            // Safely define all filter variables
            const searchInput = document.getElementById('productSearch');
            const term = searchInput ? searchInput.value.toLowerCase() : '';
            
            const catSelect = document.getElementById('categoryFilter');
            const category = catSelect ? catSelect.value : 'all';
            
            const ageSelect = document.getElementById('ageFilter');
            const age = ageSelect ? ageSelect.value : 'all';
            
            const typeSelect = document.getElementById('typeFilter');
            const type = typeSelect ? typeSelect.value : 'all';
            
            const filtered = state.products.filter(p => {
                // ❄️ IMPORTANT: Change this to p.isSummer, p.isAutumn, or p.isSpring for the other files!
                if (!p.isSummer) return false; 
                
                if (category !== 'all' && !(p.category && p.category.includes(category))) return false;
                
                if (term) {
                    const nameEn = (p.name_en || '').toLowerCase();
                    const nameAr = (p.name_ar || '').toLowerCase();
                    if (!nameEn.includes(term) && !nameAr.includes(term)) return false;
                }
                
                if (age !== 'all') {
                    const sizes = (p.sizes || []).map(s => s.trim().toUpperCase());
                    if (!sizes.includes(age.toUpperCase())) return false;
                }
                
                if (type !== 'all' && p.subCategory !== type) return false;
                
                return true;
            });
            
            grid.innerHTML = '';
            if (emptyState) {
                emptyState.classList.toggle('d-none', filtered.length > 0);
            }
            
            filtered.forEach((p, index) => {
                let imgUrl = (p.images && p.images.length > 0) ? ((typeof p.images[0] === 'object') ? p.images[0].url : p.images[0]) : 'assets/images/logo.png';
                imgUrl = (imgUrl.startsWith('http') || imgUrl.startsWith('data:')) ? imgUrl : 'uploads/' + imgUrl.replace(/^\//, '');
                
                const col = document.createElement('div'); 
                col.className = 'col-6 col-md-4 col-lg-3 season-card-wrapper';
                col.setAttribute('data-aos', 'fade-up'); 
                col.setAttribute('data-aos-delay', (index % 4) * 100);
                
                let stockBadge = !p.inStock ? `<div class="position-absolute px-4 py-2 fw-bold text-center" style="top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.75); color:white; border-radius:30px; z-index:10;">نفذت الكمية</div>` : '';
                let actionBtn = p.inStock ? `<button class="season-add-btn mt-3" onclick="openProductModal('${p._id}')">إضافة للسلة</button>` : `<button class="btn btn-secondary w-100 mt-3 rounded-pill" disabled>غير متوفر</button>`;
                let sizesHtml = p.sizes ? `<div class="mt-2 mb-2 d-flex flex-wrap justify-content-center gap-1">${p.sizes.map(s => `<span class="badge bg-white text-dark border" style="font-size: 0.7rem;">${s}</span>`).join('')}</div>` : '';

                col.innerHTML = `
                    <div class="season-product-card cursor-pointer" onclick="openProductModal('${p._id}')">
                        <div class="season-badge">❄️ شتوي</div>
                        <div class="season-card-img-container"><img src="${imgUrl}">${stockBadge}</div>
                        <div class="card-body px-2 py-3 d-flex flex-column text-center">
                            <h5 class="fw-bold mb-2 text-truncate px-1 text-dark">${p.name_ar}</h5>
                            ${sizesHtml}
                            <div class="mt-auto fs-5 fw-bold" style="color: var(--season-primary);">₪${p.price}</div>
                            <div onclick="event.stopPropagation()">${actionBtn}</div>
                        </div>
                    </div>`;
                grid.appendChild(col);
            });
        };

        // 4. Fetch Products Override
        const originalFetch = window.fetchProducts;
        if(typeof originalFetch === 'function') {
            window.fetchProducts = async function() {
                await originalFetch(); 
                
                // ❄️ IMPORTANT: Change this to p.isSummer, p.isAutumn, or p.isSpring for the other files!
                const seasonItems = state.products.filter(p => p.isSummer); 
                
                const ages = new Set(); 
                const types = new Set();
                
                seasonItems.forEach(p => { 
                    if(p.sizes) p.sizes.forEach(s => ages.add(s.trim())); 
                    if(p.subCategory) types.add(p.subCategory); 
                });
                
                const ageSelect = document.getElementById('ageFilter'); 
                if(ageSelect) {
                    Array.from(ages).sort().forEach(age => ageSelect.innerHTML += `<option value="${age}">${age}</option>`);
                }
                
                const typeSelect = document.getElementById('typeFilter'); 
                if(typeSelect) {
                    Array.from(types).sort().forEach(type => { 
                        if(type !== 'all') typeSelect.innerHTML += `<option value="${type}">${type}</option>`; 
                    });
                }
                
                window.filterGrid();
            };
        }
    </script>
</body>
</html>
