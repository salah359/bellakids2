<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تشكيلة الربيع | بيلا كيدز</title>
    <meta name="theme-color" content="#FF6B81">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* SPRING THEME - CORE STYLES */
        :root {
            --season-primary: #FF6B81;   /* Soft Pink */
            --season-secondary: #ff9a9e; /* Light Pink */
            --season-accent: #2ed573;    /* Fresh Green */
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(255, 107, 129, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif !important;
            background: linear-gradient(135deg, #fff1f2 0%, #ffeaa7 100%);
            color: #2d3436;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        #season-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none;
        }

        /* GLASSMORPHISM UI */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,0.8);
            transition: all 0.4s ease;
        }
        .glass-nav.scrolled {
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            background: rgba(255, 255, 255, 0.98) !important;
        }

        /* HERO SECTION */
        .hero-season {
            position: relative;
            padding: 15vh 0 10vh;
            text-align: center;
            overflow: hidden;
            border-bottom-left-radius: 60px;
            border-bottom-right-radius: 60px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(8px);
            border-bottom: 3px solid rgba(255,255,255,0.8);
            box-shadow: 0 20px 50px rgba(255, 107, 129, 0.05);
            margin-bottom: 60px;
        }

        .hero-title {
            font-size: clamp(3rem, 6vw, 5.5rem);
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: -1px;
            background: linear-gradient(45deg, var(--season-primary), var(--season-accent), #ff4757);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 6s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes shineText { to { background-position: 200% center; } }

        .hero-subtitle { font-size: 1.25rem; color: #4a4a4a; max-width: 700px; margin: 0 auto 40px; font-weight: 600; }
        .floating-shape { position: absolute; animation: floatUpDown 6s ease-in-out infinite; z-index: 0; opacity: 0.9; }
        @keyframes floatUpDown { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(10deg); } }

        /* ADVANCED FILTER PANEL */
        .season-filter-bar { border-radius: 50px; padding: 15px; position: relative; z-index: 10; margin-top: -50px; margin-bottom: 60px; background: rgba(255,255,255,0.9); border: 2px solid white; }
        .filter-input, .filter-select { background: rgba(255,255,255,0.95); border: 2px solid transparent !important; border-radius: 30px !important; padding: 15px 25px; font-weight: 700; color: #2d3436; transition: all 0.3s ease; }
        .filter-input:focus, .filter-select:focus { border-color: var(--season-primary) !important; box-shadow: 0 0 15px rgba(255, 107, 129, 0.3) !important; outline: none; transform: translateY(-2px); }
        .search-icon { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); color: var(--season-primary); font-size: 1.3rem; z-index: 5; }
        .filter-input { padding-right: 55px !important; }

        /* SEASON PRODUCT CARDS */
        .season-card-wrapper { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); height: 100%; }
        .season-card-wrapper:hover { transform: translateY(-15px) scale(1.02); z-index: 2; }
        .season-product-card { background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(15px); border-radius: 35px !important; border: 3px solid rgba(255,255,255,1) !important; box-shadow: 0 15px 35px rgba(0,0,0,0.06) !important; overflow: hidden; position: relative; height: 100%; display: flex; flex-direction: column; padding: 10px; }
        .season-product-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 35px; padding: 4px; background: linear-gradient(135deg, var(--season-primary), var(--season-secondary), var(--season-accent)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 10; }
        .season-card-wrapper:hover .season-product-card::before { opacity: 1; }
        .season-badge { position: absolute; top: 10px; right: 10px; background: linear-gradient(45deg, var(--season-primary), #ff4757); color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 800; z-index: 10; box-shadow: 0 4px 10px rgba(255, 107, 129, 0.3); display: flex; align-items: center; animation: pulseBadge 2.5s infinite; pointer-events: none; }
        @keyframes pulseBadge { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .season-card-img-container { position: relative; overflow: hidden; border-radius: 25px; aspect-ratio: 3/4; background: #fdfdfd; }
        .season-card-img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .season-card-wrapper:hover .season-card-img-container img { transform: scale(1.1) rotate(1deg); }
        .season-add-btn { background: linear-gradient(45deg, var(--season-primary), var(--season-secondary)); border: none; border-radius: 50px; color: white; font-weight: 900; font-size: 1.1rem; padding: 12px 25px; width: 100%; transition: all 0.4s; box-shadow: 0 8px 20px rgba(255, 107, 129, 0.4); display: flex; justify-content: center; align-items: center; gap: 10px; }
        .season-add-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255, 107, 129, 0.6); color: white; background: linear-gradient(45deg, var(--season-secondary), var(--season-primary)); }

        /* FLOATING BUTTONS */
        .cart-float { position: fixed; bottom: 110px; right: 30px; width: 70px; height: 70px; background: linear-gradient(135deg, var(--season-primary), var(--season-accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; box-shadow: 0 15px 35px rgba(255, 107, 129, 0.4); border: 3px solid white; z-index: 1000; cursor: pointer; transition: all 0.4s; animation: floatBubble 4s infinite ease-in-out; }
        .cart-float .badge { position: absolute; top: -5px; right: -5px; background: #ff4757 !important; color: white !important; border: 2px solid white; border-radius: 50%; width: 28px; height: 28px; font-size: 0.9rem; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 35px rgba(37, 211, 102, 0.4); border: 3px solid white; z-index: 1000; transition: all 0.4s; animation: floatBubble 4s infinite ease-in-out reverse; }
        .whatsapp-float img { width: 38px; height: auto; }
        .cart-float:hover, .whatsapp-float:hover { transform: scale(1.15) translateY(-10px); }
        @keyframes floatBubble { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        @media (max-width: 768px) {
            .hero-title { font-size: 2.6rem; }
            .hero-season { padding: 12vh 0 6vh; border-radius: 0 0 40px 40px; }
            .season-filter-bar { margin-top: -30px; padding: 10px; }
            .whatsapp-float, .cart-float { width: 60px; height: 60px; right: 20px; }
            .cart-float { bottom: 95px; font-size: 1.5rem; }
            .whatsapp-float { bottom: 20px; }
            .whatsapp-float img { width: 32px; }
        }
    </style>
</head>
<body>
    <canvas id="season-canvas"></canvas>

    <nav class="navbar navbar-expand-lg sticky-top glass-nav" id="main-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/home"><img src="assets/images/logo.png" alt="Bella Kids Logo" class="nav-logo"></a>

    <header class="hero-season">
        <svg class="floating-shape" style="top: 15%; right: 10%; fill: var(--season-primary);" width="60" height="60" viewBox="0 0 24 24"><path d="M12 2C8 2 4 5 4 9c0 3 2.5 5.5 5.5 7.5-.5 1.5-1 3-1.5 4.5l1.5.5c.5-1.5 1-3 1.5-4.5h2c.5 1.5 1 3 1.5 4.5l1.5-.5c-.5-1.5-1-3-1.5-4.5C17.5 14.5 20 12 20 9c0-4-4-7-8-7z"/></svg>
        <svg class="floating-shape" style="bottom: 15%; left: 8%; fill: var(--season-accent); animation-delay: 2s;" width="50" height="50" viewBox="0 0 24 24"><path d="M17 8C8 10 5.5 18 5.5 18S8 11.5 17 8z"/></svg>

        <div class="container position-relative z-1" data-aos="zoom-in">
            <span class="badge rounded-pill mb-3 px-4 py-2 shadow-sm" style="background: rgba(255,255,255,0.9); color: var(--season-primary); font-size: 1.1rem; border: 1px solid var(--season-primary);">موسم الربيع 🌸</span>
            <h1 class="hero-title">تشكيلة الربيع المبهجة</h1>
            <p class="hero-subtitle">ألوان زاهية وتصاميم تليق بجمال وحيوية أطفالكم في فصل الربيع.</p>

    <main id="shop-section" class="container pb-5">
        <div class="row justify-content-center" data-aos="fade-up">
            <div class="col-lg-11">
                <div class="glass-panel season-filter-bar shadow-sm">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-12 col-lg-3 position-relative">
                            <input type="text" id="productSearch" class="form-control filter-input w-100" placeholder="ابحث عن..." onkeyup="filterSearch()">

                        </div>
                        <div class="col-4 col-lg-3">
                            <select class="form-select filter-select" id="categoryFilter" onchange="filterSearch()">

                            </select>

                        <div class="col-4 col-lg-3">
                            <select class="form-select filter-select" id="ageFilter" onchange="filterSearch()"><option value="all">الأعمار 🎈</option></select>
                        </div>
                        <div class="col-4 col-lg-3">
                            <select class="form-select filter-select" id="typeFilter" onchange="filterSearch()"><option value="all">الأنواع 👗</option></select>
                        </div>
                    </div>
                </div>

        </div>
        <div class="row g-4 justify-content-center" id="product-grid" style="min-height: 50vh;"></div>
        <div id="empty-state" class="text-center py-5 d-none">
            <h2 class="fw-bold text-dark">لا توجد قطع مطابقة</h2>
            <p class="text-muted fs-5">جرب تغيير الفلاتر.</p>

    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content rounded-5 border-0 overflow-hidden shadow-lg glass-panel">
                <div class="row g-0">
                    <div class="col-md-6 bg-light position-relative" id="modalImageContainer"></div>
                    <div class="col-md-6 bg-white">
                        <div class="modal-header border-0 pb-0 pt-4 pe-4"><button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"></button></div>
                        <div class="modal-body p-4 pt-2">
    <h3 id="popupName" class="fw-bold mb-2" style="color: var(--season-primary);"></h3>
    <h4 id="popupPrice" class="fw-bold mb-4" style="color: #2d3436;"></h4>
    
    <p id="popupDesc" class="text-muted small mb-4"></p>
    
    <div class="mb-4 p-3 rounded-4 bg-light"><label class="small fw-bold mb-3">اختر المقاس</label><div id="sizeSelector" class="d-flex flex-wrap gap-2"></div></div>
    <div class="mb-4"><label class="small fw-bold mb-2">الألوان</label><div id="thumbnailsSelector" class="d-flex flex-wrap gap-2"></div></div>

            <button class="btn btn-sm rounded-circle fw-bold" onclick="adjustModalQty(-1)" style="width:30px; height:30px; background:#e0e0e0;">-</button>
            <input type="text" id="modalQty" class="form-control border-0 bg-transparent text-center fw-bold p-0" value="1" style="width: 40px;" readonly>
            <button class="btn btn-sm rounded-circle fw-bold text-white" onclick="adjustModalQty(1)" style="width:30px; height:30px; background:var(--season-primary);">+</button>
        </div>
    </div>
                            <button id="modalAddToCart" class="season-add-btn py-3 fs-5 mt-3">أضف إلى السلة 🛍️</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end border-0 shadow-lg glass-panel" tabindex="-1" id="cartSidebar" style="background: rgba(255,255,255,0.98);">
        <div class="offcanvas-header border-bottom py-4">
            <h4 class="fw-bold m-0" style="color: var(--season-primary);">سلة المشتريات 🛍️</h4>
            <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body" id="cartItems"></div>
        <div class="p-4 border-top bg-white rounded-top-5 shadow-lg">
            <div class="mb-3">
                <select class="form-select rounded-pill bg-light border-0 fw-bold" id="deliveryRegion" onchange="updateCartTotalUI()">
                    <option value="wb" selected>الضفة الغربية (20₪)</option><option value="jlm">القدس (30₪)</option><option value="48">الداخل 48 (70₪)</option>
                </select>
            </div>
            <div class="d-flex justify-content-between mb-4 pt-3 border-top">
                <span class="fw-bold h4 m-0">المجموع:</span><span id="cartTotal" class="fw-bold h3 m-0" style="color: var(--season-primary);">₪0.00</span>
            </div>
            <button class="btn w-100 rounded-pill py-3 fw-bold shadow-lg fs-5 text-white" onclick="sendToWhatsApp()" style="background: linear-gradient(45deg, #25d366, #128c7e);">إرسال الطلب عبر واتساب 💬</button>
        </div>
    </div>

    <div class="cart-float" data-bs-toggle="offcanvas" data-bs-target="#cartSidebar">🛍️ <span class="badge cart-count">0</span></div>
    <a href="https://wa.me/972598439251" class="whatsapp-float" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA"></a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>

    <script>
        AOS.init({ duration: 1000, once: true, offset: 50 });
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('main-nav');
            if(window.scrollY > 50) nav.classList.add('scrolled'); else nav.classList.remove('scrolled');
        });

        // SPRING PARTICLES (Petals falling down)
        const canvas = document.getElementById('season-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;
        function initParticles() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    r: Math.random() * 4 + 2, dx: (Math.random() - 0.5) * 2, dy: Math.random() * 2 + 1,
                    color: ['#FF6B81', '#ff9a9e', '#ffffff'][Math.floor(Math.random() * 3)],
                    alpha: Math.random() * 0.6 + 0.4
                });
            }
        }
        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${hexToRgb(p.color)}, ${p.alpha})`; ctx.fill();
                p.x += Math.sin(p.y * 0.02) + p.dx; p.y += p.dy;
                if(p.y > height) { p.y = -10; p.x = Math.random() * width; }
            });
            requestAnimationFrame(animateParticles);
        }
        function hexToRgb(hex) {
            const bigint = parseInt(hex.replace('#',''), 16);
            return `${(bigint >> 16) & 255},${(bigint >> 8) & 255},${bigint & 255}`;
        }
        window.addEventListener('resize', initParticles); initParticles(); animateParticles();

        // SEASON FILTER OVERRIDE
        const originalFilterGrid = window.filterGrid;
        window.filterGrid = function() {
            const grid = document.getElementById('product-grid');
            const emptyState = document.getElementById('empty-state');
            if (!grid) return;
            const searchInput = document.getElementById('productSearch');
            const term = searchInput ? searchInput.value.toLowerCase() : '';
            const category = document.getElementById('categoryFilter') ? document.getElementById('categoryFilter').value : 'all';
            const age = document.getElementById('ageFilter') ? document.getElementById('ageFilter').value : 'all';
            const type = document.getElementById('typeFilter') ? document.getElementById('typeFilter').value : 'all';
            
            const filtered = state.products.filter(p => {
                if (!p.isSeason) return false; 
                const matchesCategory = (category === 'all') ? true : (p.category && p.category.includes(category));
                const nameMatch = (p.name_en||'').toLowerCase().includes(term) || (p.name_ar||'').toLowerCase().includes(term);
                let matchesAge = true;
                if (age !== 'all') matchesAge = (p.sizes || []).map(s => s.trim().toUpperCase()).includes(age.toUpperCase());
                let matchesType = true;
                if (type !== 'all') matchesType = p.subCategory === type;
                return matchesCategory && nameMatch && matchesAge && matchesType;
            });
            
            grid.innerHTML = '';
            if(filtered.length === 0) emptyState.classList.remove('d-none');
            else {
                emptyState.classList.add('d-none');
                filtered.forEach((p, index) => {
                    const delay = (index % 4) * 100;
                    let imgUrl = (p.images && p.images.length > 0) ? ((typeof p.images[0] === 'object') ? p.images[0].url : p.images[0]) : 'assets/images/logo.png';
                    imgUrl = (imgUrl.startsWith('http') || imgUrl.startsWith('data:')) ? imgUrl : 'uploads/' + imgUrl.replace(/^\//, '');
                    
                    const col = document.createElement('div'); col.className = 'col-6 col-md-4 col-lg-3 season-card-wrapper';
                    col.setAttribute('data-aos', 'fade-up'); col.setAttribute('data-aos-delay', delay);
                    
                    let stockBadge = !p.inStock ? `<div class="position-absolute px-4 py-2 fw-bold text-center" style="top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.75); color:white; border-radius:30px; z-index:10;">نفذت الكمية</div>` : '';
                    let actionBtn = p.inStock ? `<button class="season-add-btn mt-3" onclick="openProductModal('${p._id}')">إضافة للسلة</button>` : `<button class="btn btn-secondary w-100 mt-3 rounded-pill" disabled>غير متوفر</button>`;
                    let sizesHtml = p.sizes ? `<div class="mt-2 mb-2 d-flex flex-wrap justify-content-center gap-1">${p.sizes.map(s => `<span class="badge bg-white text-dark border" style="font-size: 0.7rem;">${s}</span>`).join('')}</div>` : '';

                    col.innerHTML = `
                        <div class="season-product-card cursor-pointer" onclick="openProductModal('${p._id}')">
                            <div class="season-badge">🌸 ربيعي</div>
                            <div class="season-card-img-container"><img src="${imgUrl}">${stockBadge}</div>
                            <div class="card-body px-2 py-3 d-flex flex-column text-center">
                                <h5 class="fw-bold mb-2 text-truncate px-1 text-dark">${p.name_ar}</h5>
                                ${sizesHtml}
                                <div class="mt-auto fs-5 fw-bold" style="color: var(--season-primary);">₪${p.price}</div>
                                <div onclick="event.stopPropagation()">${actionBtn}</div>
                            </div>
                        </div>`;
                    grid.appendChild(col);
                });
            }
        };

        const originalFetch = window.fetchProducts;
        if(typeof originalFetch === 'function') {
            window.fetchProducts = async function() {
                await originalFetch(); 
                const seasonItems = state.products.filter(p => p.isSeason);
                const ages = new Set(); const types = new Set();
                seasonItems.forEach(p => { if(p.sizes) p.sizes.forEach(s => ages.add(s.trim())); if(p.subCategory) types.add(p.subCategory); });
                const ageSelect = document.getElementById('ageFilter');
                if(ageSelect) Array.from(ages).sort().forEach(age => ageSelect.innerHTML += `<option value="${age}">${age}</option>`);
                const typeMap = { "pajamas": "بيجامات", "sportswear": "رياضي", "formal": "رسمي", "overalls": "أفرهولات", "pants": "بناطيل", "dresses": "فساتين", "shoes": "أحذية" };
                const typeSelect = document.getElementById('typeFilter');
                if(typeSelect) Array.from(types).sort().forEach(type => { if(type !== 'all') typeSelect.innerHTML += `<option value="${type}">${typeMap[type] || type}</option>`; });
                window.filterGrid();
            };
        }
    </script>
</body>
</html>
